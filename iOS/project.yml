name: Parkingspend
options:
  bundleIdPrefix: com.shimondeitel.parkingspend
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Parkingspend:
    type: application
    platform: iOS
    sources:
      - path: Parkingspend
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.parkingspend
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Parkingspend/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ParkingspendTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ParkingspendTests
      - path: Parkingspend.storekit
    dependencies:
      - target: Parkingspend
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.parkingspend.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ParkingspendUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ParkingspendUITests
    dependencies:
      - target: Parkingspend
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.parkingspend.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Parkingspend:
    build:
      targets:
        Parkingspend: all
        ParkingspendTests: [test]
        ParkingspendUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Parkingspend.storekit
    test:
      config: Debug
      storeKitConfiguration: Parkingspend.storekit
      targets:
        - ParkingspendTests
        - ParkingspendUITests
    archive:
      config: Release
